# This is a Databricks asset bundle definition for databricks_asset_bundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: databricks_asset_bundle
  uuid: b1618a57-f7c2-4591-a3c8-c7a1f930f029

include:
  - resources/*.yml

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405616778394377.17.azuredatabricks.net
    presets:
      name_prefix: '[dev]-${workspace.current_user.short_name}-'
  test:
    mode: production
    workspace:
      host: https://adb-7405611241496690.10.azuredatabricks.net/
      # We explicitly deploy to /Workspace/Users/rajamahakal2026@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: rajamahakal2026@outlook.com
        level: CAN_MANAGE
    presets:
      name_prefix: '[test]-'

  prod:
    mode: production
    workspace:
      host: https://adb-7405613980711174.14.azuredatabricks.net
      # We explicitly deploy to /Workspace/Users/rajamahakal2026@outlook.com to make sure we only have a single copy.
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: rajamahakal2026@outlook.com
        level: CAN_MANAGE
    presets:
      name_prefix: '[prod]-'
